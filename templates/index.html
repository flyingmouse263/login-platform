{% extends "base.html" %}

{% block content %}
{% if user %}
<div class="card">
    <h2 class="card-title">欢迎回来，{{ user.username }}！</h2>
    <div class="user-info">
        <h3>用户信息</h3>
        <ul class="info-list">
            <li><span class="info-label">用户名：</span>{{ user.username }}</li>
            <li><span class="info-label">角色：</span>{{ user.role }}</li>
            <li><span class="info-label">余额：</span>{{ user.balance }}</li>
        </ul>
    </div>
    <div class="action-bar">
        <form method="POST" action="/logout" style="display:inline;">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-danger">退出登录</button>
        </form>
    </div>
</div>
{% else %}
<div class="card">
    <h2 class="card-title">请先登录</h2>
    <p class="card-desc">您尚未登录，请点击下方按钮登录系统。</p>
    <div class="action-bar">
        <a href="/login" class="btn btn-primary">前往登录</a>
    </div>
</div>
{% endif %}
{% endblock %}
