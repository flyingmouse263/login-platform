<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- 漏洞06修复：通过 Content-Security-Policy 限制外部资源 -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <span class="brand">用户管理系统</span>
        </div>
        <div class="nav-right">
            {% if session.get("username") %}
                <span class="nav-welcome">欢迎，{{ session["username"] }}</span>
                <a href="/upload" class="nav-link">上传头像</a>
                <!-- 漏洞14修复：登出使用 POST 表单代替 GET 链接 -->
                <form method="POST" action="/logout" class="nav-logout-form">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token or '' }}">
                    <button type="submit" class="nav-link-btn">退出</button>
                </form>
            {% else %}
                <a href="/login" class="nav-link">登录</a>
                <a href="/register" class="nav-link">注册</a>
            {% endif %}
        </div>
    </nav>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
