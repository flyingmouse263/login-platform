{% extends "base.html" %}

{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" class="login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token or '' }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary btn-full">注册</button>
    </form>

    <p style="text-align:center; margin-top:16px; font-size:14px; color:#666;">
        已有账号？<a href="/login" style="color:#667eea; text-decoration:none;">去登录</a>
    </p>
</div>
{% endblock %}
